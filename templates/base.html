<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}APSA — Analyseur SAST{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --bg2:       #161b22;
      --bg3:       #21262d;
      --border:    #30363d;
      --text:      #e6edf3;
      --text-dim:  #7d8590;
      --cyan:      #58a6ff;
      --green:     #3fb950;
      --yellow:    #d29922;
      --orange:    #db6d28;
      --red:       #f85149;
      --red-dark:  #da3633;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    nav {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 52px;
    }
    .nav-logo {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 15px;
      color: var(--cyan);
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: var(--text-dim); font-weight: 400; }
    .nav-tag {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .nav-spacer { flex: 1; }
    .nav-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      transition: color .15s;
    }
    .nav-link:hover { color: var(--text); }

    .container { max-width: 960px; margin: 0 auto; padding: 40px 24px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      text-decoration: none;
      transition: opacity .15s, background .15s;
    }
    .btn-primary {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }
    .btn-primary:hover { opacity: .85; }
    .btn-ghost {
      background: var(--bg3);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-ghost:hover { background: var(--border); }

    .badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: .5px;
    }
    .badge-CRITICAL { background: #5c0000; color: var(--red); border: 1px solid var(--red-dark); }
    .badge-HIGH     { background: #3d1a00; color: var(--orange); border: 1px solid var(--orange); }
    .badge-MEDIUM   { background: #3a2a00; color: var(--yellow); border: 1px solid var(--yellow); }
    .badge-LOW      { background: #0d2b0d; color: var(--green); border: 1px solid var(--green); }

    .alert {
      background: #2c1010;
      border: 1px solid var(--red-dark);
      color: var(--red);
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 24px;
      font-size: 13px;
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

<nav>
  <a href="{{ url_for('index') }}" style="text-decoration:none">
    <span class="nav-logo">APSA<span>.sast</span></span>
  </a>
  <span class="nav-tag">v0.1</span>
  <span class="nav-tag">ESGI 2025-2026</span>
  <span class="nav-spacer"></span>
  <a href="{{ url_for('history_page') }}" class="nav-link">📜 Historique</a>
  <a href="{{ url_for('index') }}" class="nav-link">Nouveau scan</a>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
